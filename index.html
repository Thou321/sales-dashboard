<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>7月销售目标看板 · 嘉合伟业</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js">
</script>
<style>
/* ===== MODERN DARK LUXURY DESIGN ===== */
:root {
  --bg-deep: #060613;
  --bg-card: rgba(15, 15, 35, 0.75);
  --bg-card-alt: rgba(20, 20, 45, 0.8);
  --border: rgba(255, 255, 255, 0.06);
  --border-hover: rgba(99, 102, 241, 0.35);
  --text: #e8ecf1;
  --text-dim: #8892a4;
  --text-muted: #566077;
  --accent: #6366f1;
  --accent2: #8b5cf6;
  --accent-glow: rgba(99, 102, 241, 0.25);
  --green: #10b981;
  --amber: #f59e0b;
  --rose: #f43f5e;
  --sky: #38bdf8;
  --radius: 18px;
  --radius-sm: 12px;
  --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { -webkit-tap-highlight-color: transparent; scroll-behavior: smooth; }
body {
  font-family: var(--font);
  background: var(--bg-deep);
  color: var(--text);
  min-height: 100vh;
  min-height: 100dvh;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* Subtle animated background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 0;
  background:
    radial-gradient(ellipse 80% 50% at 20% 0%, rgba(99,102,241,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 100%, rgba(139,92,246,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 50% 30% at 50% 50%, rgba(14,165,233,0.04) 0%, transparent 60%);
  pointer-events: none;
}

.container {
  max-width: 1440px;
  margin: 0 auto;
  padding: 16px 20px;
  position: relative;
  z-index: 1;
}

/* ===== HEADER ===== */
.header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  flex-wrap: wrap;
  gap: 12px;
  margin-bottom: 24px;
}
.header-left h1 {
  font-size: clamp(20px, 5vw, 30px);
  font-weight: 800;
  letter-spacing: -1px;
  background: linear-gradient(135deg, #6366f1, #8b5cf6, #a78bfa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.header-meta {
  display: flex;
  gap: 10px;
  margin-top: 6px;
  flex-wrap: wrap;
}
.pill {
  font-size: 11px;
  padding: 4px 12px;
  border-radius: 20px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text-dim);
  backdrop-filter: blur(10px);
  white-space: nowrap;
}
.pill.warn { color: var(--amber); border-color: rgba(245,158,11,0.3); }
.pill.good { color: var(--green); border-color: rgba(16,185,129,0.3); }

.header-right {
  display: flex;
  align-items: center;
  gap: 8px;
}
.btn-icon {
  width: 38px; height: 38px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--text-dim);
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(10px);
  transition: all 0.2s;
}
.btn-icon:active { transform: scale(0.92); }
.btn-icon:hover { border-color: var(--accent); color: var(--accent); }
.btn-pill {
  padding: 8px 16px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--text-dim);
  font-size: 12px;
  cursor: pointer;
  backdrop-filter: blur(10px);
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 5px;
}
.btn-pill:hover { border-color: var(--accent); color: var(--accent); }

/* ===== KPI CARDS ===== */
.kpi-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 12px;
  margin-bottom: 24px;
}
.kpi-card {
  background: var(--bg-card);
  backdrop-filter: blur(16px);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 22px;
  position: relative;
  overflow: hidden;
  transition: all 0.3s;
}
.kpi-card::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  opacity: 0;
  transition: opacity 0.3s;
}
.kpi-card:hover::after { opacity: 1; }
.kpi-card:hover {
  border-color: var(--border-hover);
  transform: translateY(-2px);
  box-shadow: 0 8px 32px var(--accent-glow);
}
.kpi-label {
  font-size: 12px;
  color: var(--text-dim);
  font-weight: 500;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
}
.kpi-value {
  font-size: clamp(22px, 4vw, 32px);
  font-weight: 800;
  letter-spacing: -1px;
}
.kpi-sub {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 4px;
}

/* Ring progress */
.ring-group {
  display: flex;
  align-items: center;
  gap: 16px;
}
.ring {
  width: 56px; height: 56px;
  flex-shrink: 0;
  position: relative;
}
.ring svg { width: 56px; height: 56px; }
.ring-val {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 800;
}

/* ===== SECTION ===== */
.section {
  margin-bottom: 24px;
}
.section-title {
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 14px;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 8px;
  letter-spacing: -0.3px;
}
.section-title::before {
  content: '';
  width: 4px; height: 18px;
  border-radius: 2px;
  background: linear-gradient(180deg, var(--accent), var(--accent2));
}

/* ===== CHARTS ===== */
.charts-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}
@media (max-width: 768px) { .charts-grid { grid-template-columns: 1fr; } }

.chart-card {
  background: var(--bg-card);
  backdrop-filter: blur(16px);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
  transition: all 0.3s;
}
.chart-card:hover {
  border-color: var(--border-hover);
}
.chart-card h3 {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-dim);
  margin-bottom: 12px;
  letter-spacing: 0.3px;
}
.chart-wrap {
  position: relative;
  width: 100%;
  height: 260px;
}
@media (max-width: 768px) { .chart-wrap { height: 220px; } }

/* ===== CATEGORY CARDS ===== */
.cat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 10px;
}
@media (max-width: 480px) {
  .cat-grid {
    grid-template-columns: 1fr 1fr;
  }
}
.cat-card {
  background: var(--bg-card);
  backdrop-filter: blur(16px);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  transition: all 0.25s;
}
.cat-card:hover {
  border-color: var(--border-hover);
  transform: translateY(-1px);
}
.cat-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}
.cat-icon {
  font-size: 22px;
  line-height: 1;
}
.cat-name {
  font-size: 14px;
  font-weight: 700;
}
.cat-pct {
  font-size: 13px;
  font-weight: 700;
  padding: 2px 10px;
  border-radius: 10px;
}
.cat-bar-row {
  margin-bottom: 6px;
}
.cat-bar-label {
  display: flex;
  justify-content: space-between;
  font-size: 10px;
  color: var(--text-dim);
  margin-bottom: 3px;
}
.cat-bar-track {
  height: 6px;
  background: rgba(255,255,255,0.06);
  border-radius: 3px;
  overflow: hidden;
}
.cat-bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
}
.cat-extra {
  font-size: 10px;
  color: var(--text-muted);
  margin-top: 6px;
}

/* ===== CHANNEL CARDS ===== */
.ch-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(min(100%, 340px), 1fr));
  gap: 12px;
}
.ch-card {
  background: var(--bg-card);
  backdrop-filter: blur(16px);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 18px;
  transition: all 0.25s;
  position: relative;
  overflow: hidden;
}
.ch-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 4px;
  height: 100%;
  opacity: 0.5;
}
.ch-card:hover {
  border-color: var(--border-hover);
}
.ch-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 14px;
}
.ch-name {
  font-size: 15px;
  font-weight: 700;
}
.ch-operator {
  font-size: 11px;
  color: var(--text-muted);
  display: block;
  margin-top: 2px;
}
.ch-badge {
  font-size: 10px;
  padding: 3px 10px;
  border-radius: 12px;
  font-weight: 600;
  letter-spacing: 0.3px;
  white-space: nowrap;
}
.badge-green { background: rgba(16,185,129,0.15); color: var(--green); }
.badge-amber { background: rgba(245,158,11,0.15); color: var(--amber); }
.badge-rose  { background: rgba(244,63,94,0.15); color: var(--rose); }
.badge-sky   { background: rgba(56,189,248,0.15); color: var(--sky); }

.ch-bar-section { margin-bottom: 10px; }
.ch-bar-header {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  margin-bottom: 4px;
}
.ch-bar-header .ch-bar-title { color: var(--text-dim); }
.ch-bar-header .ch-bar-val { font-weight: 600; font-size: 11px; }
.ch-bar-track {
  height: 6px;
  background: rgba(255,255,255,0.06);
  border-radius: 3px;
  overflow: hidden;
}
.ch-bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
}
.ch-cats {
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
}
.ch-cat-title {
  font-size: 10px;
  color: var(--text-muted);
  margin-bottom: 6px;
}
.ch-cat-row {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 4px;
}
.ch-cat-label {
  width: 34px;
  font-size: 10px;
  color: var(--text-dim);
  flex-shrink: 0;
}
.ch-cat-mini-track {
  flex: 1;
  height: 4px;
  background: rgba(255,255,255,0.06);
  border-radius: 2px;
  overflow: hidden;
}
.ch-cat-mini-fill {
  height: 100%;
  border-radius: 2px;
}
.ch-cat-mini-pct {
  width: 32px;
  font-size: 10px;
  font-weight: 600;
  text-align: right;
  flex-shrink: 0;
}

/* ===== TABLE ===== */
.table-shell {
  background: var(--bg-card);
  backdrop-filter: blur(16px);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.table-scroll {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
  min-width: 700px;
}
thead th {
  background: rgba(15,15,35,0.95);
  color: var(--text-dim);
  font-weight: 600;
  padding: 10px 12px;
  text-align: center;
  border-bottom: 1px solid var(--border);
  font-size: 11px;
  letter-spacing: 0.3px;
  white-space: nowrap;
  position: sticky;
  top: 0;
  z-index: 2;
}
td {
  padding: 8px 12px;
  text-align: center;
  border-bottom: 1px solid rgba(255,255,255,0.03);
}
td.name-cell {
  text-align: left;
  font-weight: 600;
}
tr:hover td {
  background: rgba(99,102,241,0.04);
}
tr.total-row td {
  font-weight: 700;
  background: rgba(99,102,241,0.06);
  border-bottom: 1px solid rgba(99,102,241,0.15);
}
.mini-bar-wrap {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  min-width: 80px;
}
.mini-bar-track {
  width: 50px;
  height: 4px;
  background: rgba(255,255,255,0.06);
  border-radius: 2px;
  overflow: hidden;
}
.mini-bar-fill {
  height: 100%;
  border-radius: 2px;
}

/* ===== FOOTER ===== */
.footer {
  text-align: center;
  padding: 20px 0;
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.3px;
}

/* ===== MOBILE ===== */
@media (max-width: 640px) {
  .container { padding: 10px 12px; }
  .kpi-row { grid-template-columns: 1fr 1fr; gap: 8px; }
  .kpi-card { padding: 14px 16px; }
  .kpi-value { font-size: 20px; }
  .cat-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
  .ch-grid { grid-template-columns: 1fr; gap: 8px; }
  .header-left h1 { font-size: 20px; }
  .chart-card { padding: 12px; }
  .chart-wrap { height: 200px; }
  td, th { padding: 6px 8px; font-size: 11px; }
}
@media (max-width: 380px) {
  .kpi-row { grid-template-columns: 1fr; }
  .cat-grid { grid-template-columns: 1fr; }
}

/* ===== ANIMATIONS ===== */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}
.anim-up {
  animation: fadeUp 0.5s ease-out both;
}
.anim-d1 { animation-delay: 0s; }
.anim-d2 { animation-delay: 0.05s; }
.anim-d3 { animation-delay: 0.1s; }
.anim-d4 { animation-delay: 0.15s; }
.anim-d5 { animation-delay: 0.2s; }
</style>
</head>
<body>
<div class="container">

<!-- HEADER -->
<header class="header anim-up anim-d1">
  <div class="header-left">
    <h1>📊 7月销售目标看板</h1>
    <div class="header-meta">
      <span class="pill">📅 <span id="meta-date">-</span></span>
      <span class="pill">🕐 更新于 <span id="meta-gen">-</span></span>
      <span class="pill warn">⏳ 本月已过 <span id="meta-time">-</span>%</span>
      <span class="pill good" id="next-update-pill">🔄 下次更新 <span id="next-update">-</span></span>
    </div>
  </div>
  <div class="header-right">
    <button class="btn-pill" onclick="location.reload()" title="刷新数据">🔄 刷新</button>
  </div>
</header>

<!-- KPI CARDS -->
<div class="kpi-row" id="kpiRow"></div>

<!-- CHARTS ROW 1 -->
<div class="section anim-up anim-d3">
  <div class="section-title">📈 数据可视化</div>
  <div class="charts-grid">
    <div class="chart-card">
      <h3>各类目销售额 · 目标 vs 实际</h3>
      <div class="chart-wrap"><canvas id="catBarChart"></canvas></div>
    </div>
    <div class="chart-card">
      <h3>各渠道实销占比</h3>
      <div class="chart-wrap"><canvas id="channelPieChart"></canvas></div>
    </div>
  </div>
</div>

<!-- CHARTS ROW 2 -->
<div class="section anim-up anim-d4">
  <div class="charts-grid">
    <div class="chart-card">
      <h3>各类目完成率对比</h3>
      <div class="chart-wrap"><canvas id="catRateChart"></canvas></div>
    </div>
    <div class="chart-card">
      <h3>各渠道销售额进度</h3>
      <div class="chart-wrap"><canvas id="channelBarChart"></canvas></div>
    </div>
  </div>
</div>

<!-- CATEGORY PROGRESS -->
<div class="section anim-up anim-d4">
  <div class="section-title">📂 类目进度</div>
  <div class="cat-grid" id="catGrid"></div>
</div>

<!-- CHANNEL CARDS -->
<div class="section anim-up anim-d5">
  <div class="section-title">🏪 渠道进度</div>
  <div class="ch-grid" id="chGrid"></div>
</div>

<!-- DETAIL TABLE -->
<div class="section anim-up anim-d5">
  <div class="section-title">📋 明细汇总（渠道 × 类目）</div>
  <div class="table-shell">
    <div class="table-scroll">
      <table>
        <thead><tr>
          <th>渠道</th><th>类目</th><th>目标销售额</th><th>实际销售额</th><th>完成率</th><th>目标毛利润</th><th>实际毛利润</th><th>利润进度</th>
        </tr></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- FOOTER -->
<footer class="footer">
  数据来源：ERP网销商品统计 + 7月销售计划 · 每小时自动更新 · 生成于 <span id="footerGen">-</span>
</footer>

</div>

  if (r >= 41)  return 'badge-amber';

    <div class="cat-bar-row">
      <div class="cat-bar-label"><span>📊 毛利润</span><span style="color:${d.actual_profit<0?'var(--rose)':''}">${fmtYS(d.actual_profit)} / ${fmtY(d.target_profit)}</span></div>
      <div class="cat-bar-track"><div class="cat-bar-fill" style="width:${Math.max(0, Math.min(Math.abs(d.profit_rate), 100))}%;background:${d.profit_rate<0?'var(--rose)':barColor(Math.abs(d.profit_rate))}"></div></div>
    </div>
    <div class="cat-extra">缺口 ${fmtY(Math.max(0, d.target_amount - d.actual_amount))} · 利润进度 ${fmtR(d.profit_rate)}</div>`;
  catGrid.appendChild(card);
});

// ===== CHANNEL CARDS =====
const chGrid = document.getElementById('chGrid');
DATA.channels.forEach(ch => {
  let catsHtml = '';
  DATA.categories.forEach(cat => {
    const cd = ch.categories[cat];
    if (cd.target_amount > 0 || cd.actual_amount > 0) {
      catsHtml += `
      <div class="ch-cat-row">
        <span class="ch-cat-label">${cat}</span>
        <div class="ch-cat-mini-track"><div class="ch-cat-mini-fill" style="width:${Math.min(cd.amount_rate,100)}%;background:${barColor(cd.amount_rate)}"></div></div>
        <span class="ch-cat-mini-pct" style="color:${barColor(cd.amount_rate)}">${fmtR2(cd.amount_rate)}</span>
      </div>`;
    }
  });

  const card = document.createElement('div');
  card.className = 'ch-card';
  card.innerHTML = `
    <div class="ch-top">
      <div>
        <span class="ch-name">${ch.name}</span>
        <span class="ch-operator">👤 ${ch.operator}</span>
      </div>
      <span class="ch-badge ${statusBadge(ch.amount_rate)}">${statusTxt(ch.amount_rate)}</span>
    </div>
    <div class="ch-bar-section">
      <div class="ch-bar-header">
        <span class="ch-bar-title">📈 销售额</span>
        <span class="ch-bar-val" style="color:${barColor(ch.amount_rate)}">${fmtY(ch.actual_amount)} / ${fmtY(ch.target_amount)} · ${fmtR2(ch.amount_rate)}</span>
      </div>
      <div class="ch-bar-track"><div class="ch-bar-fill" style="width:${Math.min(ch.amount_rate,100)}%;background:${barColor(ch.amount_rate)}"></div></div>
    </div>
    <div class="ch-bar-section">
      <div class="ch-bar-header">
        <span class="ch-bar-title">💰 毛利润</span>
        <span class="ch-bar-val" style="color:${ch.profit_rate<0?'var(--rose)':barColor(Math.abs(ch.profit_rate))}">${fmtYS(ch.actual_profit)} / ${fmtY(ch.target_profit)} · ${fmtR(ch.profit_rate)}</span>
      </div>
      <div class="ch-bar-track"><div class="ch-bar-fill" style="width:${Math.max(0,Math.min(Math.abs(ch.profit_rate),100))}%;background:${ch.profit_rate<0?'var(--rose)':barColor(Math.abs(ch.profit_rate))}"></div></div>
    </div>
    <div class="ch-cats">
      <div class="ch-cat-title">类目明细</div>
      ${catsHtml}
    </div>`;
  chGrid.appendChild(card);
});

// ===== DETAIL TABLE =====
const tbody = document.getElementById('tableBody');
DATA.channels.forEach(ch => {
  let hasData = false;
  DATA.categories.forEach(cat => {
    const d = ch.categories[cat];
    if (d.target_amount === 0 && d.actual_amount === 0) return;
    hasData = true;
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="name-cell">${ch.name}</td>
      <td>${catIcons[cat]||''} ${cat}</td>
      <td>${fmtY(d.target_amount)}</td>
      <td>${fmtY(d.actual_amount)}</td>
      <td><span style="color:${barColor(d.amount_rate)};font-weight:600">${fmtR2(d.amount_rate)}</span></td>
      <td>${fmtY(d.target_profit)}</td>
      <td style="color:${d.actual_profit<0?'var(--rose)':'var(--green)'}">${fmtYS(d.actual_profit)}</td>
      <td><span style="color:${d.profit_rate<0?'var(--rose)':barColor(Math.abs(d.profit_rate))};font-weight:600">${fmtR(d.profit_rate)}</span></td>`;
    tbody.appendChild(tr);
  });
  if (hasData) {
    const tr = document.createElement('tr');
    tr.className = 'total-row';
    tr.innerHTML = `
      <td class="name-cell">${ch.name} 合计</td>
      <td>-</td>
      <td>${fmtY(ch.target_amount)}</td>
      <td>${fmtY(ch.actual_amount)}</td>
      <td style="color:${barColor(ch.amount_rate)}">${fmtR2(ch.amount_rate)}</td>
      <td>${fmtY(ch.target_profit)}</td>
      <td style="color:${ch.actual_profit<0?'var(--rose)':'var(--green)'}">${fmtYS(ch.actual_profit)}</td>
      <td style="color:${ch.profit_rate<0?'var(--rose)':barColor(Math.abs(ch.profit_rate))}">${fmtR(ch.profit_rate)}</td>`;
    tbody.appendChild(tr);
  }
});
</script>
</body>
</html>
